# ============================================================
#  AKASH-DARPAN  —  akash_config.ini
#  Default system configuration for ISRO SH-WFS AO pipeline
#  Edit this file to match your hardware setup.
#  Lines starting with # or ; are comments.
# ============================================================

# ── Camera / Detector ──────────────────────────────────────
[camera]
frame_width    = 512        ; pixels (horizontal)
frame_height   = 512        ; pixels (vertical)
pixel_size_um  = 5.5        ; detector pixel pitch in micrometres

# ── Microlens Array (MLA) ──────────────────────────────────
[mla]
mla_grid_x     = 10         ; number of lenslets along X
mla_grid_y     = 10         ; number of lenslets along Y
lenslet_um     = 300.0      ; physical lenslet pitch (µm)
focal_mm       = 5.0        ; MLA focal length (mm)

# ── Beam Pupil ─────────────────────────────────────────────
[pupil]
pupil_diam_mm  = 8.0        ; beam diameter at MLA (mm)

# ── Deformable Mirror ──────────────────────────────────────
[dm]
dm_grid_x      = 9          ; actuator count along X (Fried: mla+1 or mla-1)
dm_grid_y      = 9          ; actuator count along Y
dm_stroke_um   = 5.0        ; maximum actuator stroke (±µm)
dm_coupling    = 0.15       ; inter-actuator coupling coefficient [0..0.5]
                             ; 0.15 = typical MEMS DM, 0.25 = piezo-stack DM

# ── Adaptive Optics ────────────────────────────────────────
[ao]
wavelength_nm  = 532.0      ; science / guide-star wavelength (nm)
                             ; 532 = green laser  |  589 = sodium D  |  850 = NIR
cog_threshold  = 30.0       ; ADU floor for centroiding (reject dark noise)

# ── Playback / Data ────────────────────────────────────────
[playback]
data_path      =             ; leave blank to use synthetic frames
                             ; or set to folder containing sorted .bmp files
playback_speed = 1.0         ; 0.1x (slow-motion) to 3.0x (fast-forward)

# ── Notes ──────────────────────────────────────────────────
# Fried Geometry:  DM actuators sit at lenslet corners.
#   For N×N lenslets → (N+1)×(N+1) ideal actuator count.
#   Interior subset (N-1)×(N-1) is commonly used.
#   Default: 10×10 MLA → 9×9 DM (inner actuators only).
#
# Coupling coefficient c: fraction of neighbouring actuator
#   stroke that bleeds into the current actuator.
#   c = exp(-d²/2σ²) where d = inter-actuator spacing.
#
# Performance target: total loop time < 5 ms @ 100 fps.
#   Typical breakdown:
#     Image I/O    : ~0.1 ms
#     Centroiding  : ~0.3 ms  (OpenMP parallel over sub-apertures)
#     Reconstruction : ~0.8 ms
#     DM mapping   : ~0.4 ms
#     Total        : ~1.6 ms  (leaves 3.4 ms headroom)
